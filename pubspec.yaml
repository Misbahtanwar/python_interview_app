name: python_interview_app_frontend
description: "A new Flutter project for AI Interview Assistant."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  http: ^1.1.0
  file_picker: ^10.3.10
  flutter_spinkit: ^5.2.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3F51B5" 
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#3F51B5"
  image: "assets/logo.png"
  android_12:
    image: "assets/logo.png"
    color: "#3F51B5"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - .env